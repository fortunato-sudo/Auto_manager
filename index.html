<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">

		<!-- PWA base -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
		<meta name="theme-color" content="#0f0f12">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="apple-mobile-web-app-title" content="Garage Manager">
		<link rel="apple-touch-icon" href="img/icon-180.png">
		<link rel="manifest" href="manifest.json">
        <link rel="icon" href="img/icon.png">
        
		<link rel="stylesheet" href="style.css">

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script type="module" src="js/app.js"></script>
    </head>

    <body class="loading">
		<div id="splash">
    		<div class="splashContent">
        		<img src="img/logo.png" class="splashLogo">
        		<div class="splashTitle">Garage Manager</div>
   	 		</div>
		</div>

        <div id="app"></div>
        
        <div id="menuDrawer" class="menuDrawer">
			<div class="menuVehicle">
				<div id="menuVehicleName"></div>
				<div id="menuVehicleKm"></div>
			</div>

			<div class="menuDivider"></div>
			<div class="menuGarage" onclick="nav('garage')">🚘 Garage</div>
			<div class="menuDivider"></div>
			<div class="menuItem" onclick="nav('home')">🏠 Home</div>
			<div class="menuItem" onclick="nav('manut')">🔧 Manutenzioni</div>
			<div class="menuItem" onclick="nav('registro')">📋 Registro</div>
			<div class="menuItem" onclick="nav('fuel')">⛽ Rifornimenti</div>
			<div class="menuItem" onclick="nav('stats')">📊 Statistiche</div>

			<div class="menuBottom">
				<div class="menuDarkRow" onclick="toggleDark()">
					<span id="darkLabel">🌙 Dark mode</span>

					<div class="switch switchActive" id="darkSwitch">
						<div class="switchKnob"></div>
					</div>

				</div>
			</div>
		</div>
		<div id="menuOverlay" class="menuOverlay"></div>
	</body>
</html>
